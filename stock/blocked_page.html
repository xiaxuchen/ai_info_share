/*#region init */

.em_holder .em_init {
    height: 36px;
    width: auto;
    min-width: 260px;
    position: relative;
    border: 1px solid #f3f3f3;
    cursor: pointer;
    overflow: visible;
    background-color: #fff;
    background-image: linear-gradient(180deg, #ffffff 0, #f3f3f3 100%);
    padding-top: 6px;
}

.em_holder .em_init .em_init_icon {
    position: relative;
    left: 10px;
    top: 5px;
    /* margin:8px 0 0 10px; */
    width: 20px;
    height: 20px;
    background: transparent;
    background-image: url(//cfgpassport2.eastmoney.com/captcha/content/img/icon_init.png);
    background-size: cover;
    -moz-transition: all .2s linear;
    -o-transition: all .2s linear;
    -webkit-transition: all .2s linear;
    transition: all .2s linear;
    background: none\9;
    filter: progid:DXImageTransform.Microsoft.AlphaImageLoader(src='https://cfgpassport.eastmoney.com/captcha/Content/img/icon_init.png', sizingMethod='scale');
}

.em_holder .em_init .em_init_guide_tip {
    position: absolute;
    left: 40px;
    width: 180px;
    height: 14px;
    line-height: 14px !important;
    font-size: 14px !important;
    color: #474747;
    opacity: 1;
    filter: alpha(opacity=100);
    padding-top: 3px;
}

.em_holder .em_init.loading {
    border: 1px solid #f5f5f5;
    background-image: none !important;
    background-color: #ffffff !important;
    cursor: default;
}

.em_holder .em_init.loading .em_init_icon {
    background-image: url(//cfgpassport2.eastmoney.com/captcha/content/img/icon_valid.png) !important;
    background-size: cover;
    -moz-transition: all .2s linear;
    -o-transition: all .2s linear;
    -webkit-transition: all .2s linear;
    transition: all .2s linear;
    background: none\9 !important;
    filter: progid:DXImageTransform.Microsoft.AlphaImageLoader(src='https://cfgpassport.eastmoney.com/captcha/Content/img/icon_valid.png', sizingMethod='scale') !important;
}

.em_holder .em_init.loading .em_init_guide_tip {
    color: #58B1FE !important;
}

}
